stageIdx=0; frame=0;

function loop(){
  ctx.clearRect(0,0,GW,GH);

  if(state==='ending'){
    updateEnding();
    drawEndingScene();
  } else {
    const bgD=(state==='playing'||state==='gameover'||state==='clear')?dist:frame*0.4;
    drawBG(bgD, stageIdx||0);
    drawWeather(STAGES[stageIdx||0].w, frame);

    if(state==='playing'){
      if(!paused) update();
      drawPlatforms();
      for(const e of entities){
        if(!e.alive) continue;
        if(e.type==='npc')                drawNPC(e.x,e.y,e.chainIdx,frame);
        else if(e.type==='drop')          drawFieldDrop(e.x,e.y,e.chainIdx,frame);
        else if(e.sub==='rock')           drawRock(e.x,e.y);
        else if(e.sub==='kite')           drawKite(e.x,e.y,frame);
        else if(e.sub&&e.sub.startsWith('crow')) drawCrow(e.x,e.y,e.sub,frame);
        else if(e.sub&&e.sub.startsWith('oihagi')){
          const ecx=rr(e.x+15);
          ctx.save();
          ctx.translate(ecx,GY); ctx.scale(ESCALE,ESCALE); ctx.translate(-ecx,-GY);
          ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=3;
          const oPhase=(e.sub==='oihagi')?e.phase:(e.phase==='lunge'||e.phase==='thrust'||e.phase==='leap')?'leap':'grin';
          const oEY=e.phase==='charge'?e.y+5:e.y;
          drawOihagi(e.x,oEY,oPhase,frame);
          if(e.sub==='oihagi_sword')drawOihagiSword(e.x,e.y,e.phase==='thrust',frame);
          if(e.sub==='oihagi_rush') drawOihagiRush(e.x,e.y,frame);
          if(e.sub==='oihagi_lunge')drawOihagiLunge(e.x,e.y,e.phase,e.chargeT||0);
          ctx.shadowBlur=0; ctx.shadowColor='transparent';
          ctx.restore();
        }
        else if(e.sub==='tanuki'){
          const tcx=rr(e.x+8);
          ctx.save();
          ctx.translate(tcx,GY); ctx.scale(ESCALE,ESCALE); ctx.translate(-tcx,-GY);
          drawTanuki(e.x,e.y,frame);
          ctx.restore();
        }
        else if(e.sub==='heart')          drawHeart(e.x,e.y,frame);
        else if(e.sub==='bamboo')         drawBamboo(e);
      }
      ctx.save();
      ctx.translate(rr(PX+13),GY); ctx.scale(PSCALE,PSCALE); ctx.translate(-rr(PX+13),-GY);
      ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=3;
      drawPlayer(py,frame,invuln,items.filter(Boolean).length-1);
      ctx.shadowBlur=0; ctx.shadowColor='transparent';
      ctx.restore();
      if(!paused) drawSpeedLines(items&&items[4]?13:speed,frame);
      drawNpcPopup();
      drawBridgeDebris();
      if(bridgeActive) drawBridgeLogs();
      // 雨の夜道：霧で視界制限
      if(stageIdx===2){
        const fg=ctx.createLinearGradient(GW*0.18,0,GW,0);
        fg.addColorStop(0,'rgba(6,4,10,0)');
        fg.addColorStop(0.5,'rgba(6,4,10,0.30)');
        fg.addColorStop(1,'rgba(6,4,10,0.68)');
        ctx.fillStyle=fg; ctx.fillRect(0,0,GW,GH);
      }
      drawHUD();
      // ── わらしべアタックボタン（右下）
      if(!paused){
        const canAtk=items&&items.filter(Boolean).length>=2&&attackCooldown===0;
        const bx=GW-78,by=GH-104,bw=70,bh=52; // ホームインジケーター対応・タップ面積拡大
        ctx.save();
        ctx.globalAlpha=canAtk?0.90:0.28;
        ctx.fillStyle=canAtk?'#6A2800':'#1C0C00';
        ctx.strokeStyle=canAtk?'#E07020':'#5A3010';
        ctx.lineWidth=2;
        ctx.fillRect(bx,by,bw,bh);
        ctx.strokeRect(bx,by,bw,bh);
        ctx.globalAlpha=canAtk?1.0:0.40;
        ctx.fillStyle=canAtk?'#FFD060':'#9A7030';
        ctx.font='bold 10px monospace'; ctx.textAlign='center';
        ctx.fillText('わらしべ',bx+bw/2,by+18);
        ctx.fillText('アタック',bx+bw/2,by+32);
        if(!canAtk){
          ctx.font='9px monospace'; ctx.fillStyle='#A07040';
          ctx.fillText(items&&items.filter(Boolean).length<2?'荷物2個必要':'CT中',bx+bw/2,by+44);
        }
        ctx.restore();
        // 投石描画
        for(const p of projectiles){
          ctx.fillStyle='#907870';
          ctx.beginPath(); ctx.arc(rr(p.x),rr(p.y),4,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#C0B0A8';
          ctx.beginPath(); ctx.arc(rr(p.x-1),rr(p.y-1),2,0,Math.PI*2); ctx.fill();
        }
        // 凧浮遊タイマーバー
        if(kiteActive){
          const t=kiteT/KITE_FLOAT_DUR;
          ctx.fillStyle='rgba(0,0,0,0.55)';
          ctx.fillRect(GW/2-44,12,88,10);
          ctx.fillStyle=`hsl(${180+60*t},80%,60%)`;
          ctx.fillRect(GW/2-44,12,Math.round(88*t),10);
          ctx.fillStyle='#A8E8FF';
          ctx.font='bold 8px monospace'; ctx.textAlign='center';
          ctx.fillText('凧 浮遊中',GW/2,11);
          ctx.textAlign='left';
        }
      }
      // ポーズボタン（右上・44px以上）
      ctx.fillStyle=paused?'rgba(240,200,0,0.85)':'rgba(255,255,255,0.22)';
      ctx.fillRect(GW-50,4,46,40);
      ctx.fillStyle=paused?'#3A2000':'rgba(0,0,0,0.6)';
      ctx.font='bold 13px monospace'; ctx.textAlign='center';
      ctx.fillText(paused?'▶':'❙❙',GW-27,28); ctx.textAlign='left';
      if(paused) drawPauseScreen();
      drawStageTransition();
      drawMessage();
      // ゴール前の盛り上がり演出
      const gp=dist/GOAL_DIST;
      if(gp>=0.82){
        const gt=Math.min(1,(gp-0.82)/0.18);
        const pls=0.85+0.15*Math.sin(frame*0.12);
        ctx.fillStyle=`rgba(240,150,0,${gt*0.11*pls})`;
        ctx.fillRect(0,0,GW,GH);
      }
      if(gp>=0.95){
        const gt2=Math.min(1,(gp-0.95)/0.05);
        const rg=ctx.createRadialGradient(GW/2,GH/2,GH*0.1,GW/2,GH/2,GH*0.7);
        rg.addColorStop(0,'rgba(0,0,0,0)');
        rg.addColorStop(1,`rgba(240,120,0,${gt2*0.28})`);
        ctx.fillStyle=rg; ctx.fillRect(0,0,GW,GH);
      }
      // 馬フラッシュ演出
      if(horseFlashT>0){
        const t=horseFlashT/90;
        if(horseFlashT>60){
          ctx.fillStyle=`rgba(255,220,0,${t*0.45})`; ctx.fillRect(0,0,GW,GH);
        }
        ctx.textAlign='center';
        const sc=horseFlashT>60?1+(1-t)*0.8:t*0.9+0.1;
        ctx.save(); ctx.translate(GW/2,GH*0.38); ctx.scale(sc,sc);
        ctx.shadowColor='#FFAA00'; ctx.shadowBlur=20*(horseFlashT>60?1-t:t);
        ctx.fillStyle=horseFlashT>60?'#3A1800':'#FFD700';
        ctx.font='bold 22px monospace'; ctx.fillText('馬！！全力疾走！！',0,0);
        ctx.shadowBlur=0; ctx.restore(); ctx.textAlign='left';
      }
    } else if(state==='gameover'){
      drawPlayer(py,frame,false,items?items.filter(Boolean).length-1:0);
      drawGameOverScreen();
      frame++;
    } else if(state==='clear'){
      drawClearScreen();
      frame++;
    } else {
      drawStartScreen();
      frame++;
    }
  }
  requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════════════════════
function togglePause(){
  if(state==='playing'){
    paused=!paused;
    if(paused)BGM.pause(); else BGM.resume();
  }
}
function doAction(){
  tryFullscreen();
  if(state==='ending') return;
  if(paused){paused=false; return;}
  if(state==='clear'){state='start'; return;}
  if(state!=='playing'){initGame(); return;}
  // 凧浮遊中：タップで上昇
  if(kiteActive){vy=KITE_RISE; SFX.jump(); return;}
  // 地上ジャンプ
  if(grounded){
    vy=(items&&items[4])?JF*1.5:JF; grounded=false; doubleJumped=false; SFX.jump();
  // 2段ジャンプ（アイテム2個以上所持時）
  } else if(!doubleJumped&&items&&items.filter(Boolean).length>=2){
    vy=JF*0.78; doubleJumped=true; SFX.jump();
  }
}
function doAttack(){
  if(state!=='playing'||paused) return;
  if(!items||items.filter(Boolean).length<2||attackCooldown>0) return;
  // ランダムで2個アイテムロスト
  const owned=items.map((v,i)=>v?i:-1).filter(i=>i>=0);
  for(let i=owned.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[owned[i],owned[j]]=[owned[j],owned[i]];}
  owned.slice(0,2).forEach(i=>{items[i]=false; lostItems[i]=true;});
  projectiles.push({x:PX+24,y:py+16,vy:-3.5});
  attackCooldown=80;
  beep(280,0.07,'sawtooth',0.14); setTimeout(()=>beep(380,0.05,'square',0.10),35);
  msg='石を投げた！荷物2個ロスト'; msgT=140;
}
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault(); doAction();}
  if((e.code==='KeyP'||e.code==='Escape')&&state==='playing'){e.preventDefault(); togglePause();}
});
document.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];
  const rect=canvas.getBoundingClientRect();
  const tx=(t.clientX-rect.left)*(GW/rect.width);
  const ty=(t.clientY-rect.top)*(GH/rect.height);
  if(state==='playing'&&tx>=GW-52&&ty<=46){togglePause();return;}
  if(state==='playing'&&!paused&&tx>=GW-80&&ty>=GH-106&&tx<=GW-6&&ty<=GH-6){doAttack();return;}
  doAction();
},{passive:false});
document.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const tx=(e.clientX-rect.left)*(GW/rect.width);
  const ty=(e.clientY-rect.top)*(GH/rect.height);
  if(state==='playing'&&tx>=GW-52&&ty<=46){togglePause();return;}
  if(state==='playing'&&!paused&&tx>=GW-80&&ty>=GH-106&&tx<=GW-6&&ty<=GH-6){doAttack();return;}
  doAction();
});

requestAnimationFrame(loop);
</script>
